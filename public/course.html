<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA | Curso</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/course-content.js"></script>
  <script src="js/ga-demo.js"></script>
  <style>
    .module-content { display: none; animation: fadeUp 0.3s ease both; }
    .module-content.active { display: flex; flex-direction: column; gap: 1rem; }
    .lesson-text { color: var(--text); line-height: 1.7; font-size: 1rem; }
    .lesson-text h2 { color: #fff; font-size: 1.8rem; margin-bottom: 1rem; }
    .lesson-text h3 { color: var(--accent2); font-size: 1.2rem; margin-top: 2rem; margin-bottom: 0.75rem; }
    .lesson-text p { color: #94a3b8; margin-bottom: 0.75rem; }
    .lesson-text ul { margin-left: 1.5rem; }
    .lesson-text li { color: #94a3b8; margin-bottom: 0.5rem; }
    .lesson-text code { background: rgba(99,102,241,0.15); color: var(--accent); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; }
    .content-formula { background: rgba(10,15,30,0.9); border: 1px solid rgba(99,102,241,0.4); border-radius: 8px; padding: 1rem 1.5rem; text-align: center; margin: 1rem 0; }
    .content-formula .formula-label { display: block; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .content-formula code { background: none; color: var(--accent); font-size: 1.05rem; padding: 0; }
    .content-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .content-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .content-box { background: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 1.25rem; }
    .content-box p { margin: 0; font-size: 0.9rem; }
    .content-box ul { margin-left: 1.2rem; }
    .content-box li { font-size: 0.9rem; }
    .box-title { font-weight: 700; color: var(--text); margin-bottom: 0.5rem; font-size: 0.95rem; }
    .content-box-sm { border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; font-weight: 600; text-align: center; }
    .content-box-sm.green { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .content-box-sm.yellow { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .content-box-sm.red { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .content-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 1rem 0; }
    .content-table th { background: rgba(99,102,241,0.2); color: var(--accent); padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid rgba(99,102,241,0.3); }
    .content-table td { padding: 0.55rem 1rem; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .content-table .total-row td { color: var(--text); background: rgba(30,41,59,0.5); font-weight: 600; }
    .steps-container { display: flex; flex-direction: column; gap: 0.75rem; margin: 1rem 0; }
    .step { display: flex; gap: 1rem; align-items: flex-start; background: rgba(30,41,59,0.4); border-radius: 8px; padding: 1rem 1.25rem; border: 1px solid rgba(255,255,255,0.06); }
    .step-num { background: var(--accent); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; margin-top: 2px; }
    .step-content strong { color: var(--text); display: block; margin-bottom: 0.3rem; }
    .step-content p { margin: 0; font-size: 0.88rem; color: #94a3b8; }
    .code-block { background: #0a0f1e; border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; padding: 1.25rem; font-family: 'Share Tech Mono', monospace; font-size: 0.82rem; color: #22d3ee; white-space: pre-wrap; line-height: 1.7; margin: 1rem 0; }
    .quiz-question { background: rgba(30,41,59,0.5); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05); }
    .quiz-option { display: block; padding: 0.8rem; margin: 0.5rem 0; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .quiz-option:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.5); }
    .quiz-option input { margin-right: 10px; }
    .cert-box { text-align: center; padding: 3rem; background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1)); border: 2px solid var(--accent); border-radius: 16px; margin-top: 2rem; }
    .tool-box { background: rgba(15,23,42,0.8); border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; padding: 2rem; }
    @media (max-width: 700px) { .content-grid-2, .content-grid-3 { grid-template-columns: 1fr; } }
  </style>
  <script>
    if (!sessionStorage.getItem('currentStudent')) {
      window.location.href = 'login.html?type=student';
    }
  </script>
</head>
<body>
  <canvas id="neural"></canvas>

  <div class="dashboard-layout">
    <div class="sidebar" id="course-sidebar">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <span class="badge" style="font-size: 0.7rem; letter-spacing: 0.1em;" id="course-badge">CARGANDO...</span>
      </div>
      <a href="dashboard.html" class="sidebar-item" style="color: var(--muted); border: 1px solid rgba(255,255,255,0.1); justify-content: center; margin-bottom: 1rem;">← Volver al Panel</a>
      
      <div id="module-menu" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
    </div>

    <div class="dashboard-content">
      <div class="card" style="align-items: stretch; padding: 2.5rem 3rem; min-height: 80vh;">
        <h2 id="course-title" style="font-size: 2.2rem; margin-bottom: 0.5rem; color: #fff;">Cargando Curso...</h2>
        <p class="sub" id="module-title" style="margin-bottom: 2rem; font-size: 1.1rem; color: var(--accent2);">Selecciona un módulo</p>

        <div id="content-area"></div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    const currentStudent = JSON.parse(sessionStorage.getItem('currentStudent'));
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    if (!courseId) window.location.href = 'dashboard.html';


    const course = window.COURSE_DATA[courseId];
    if (!course) {
      document.getElementById('content-area').innerHTML = '<p class="msg danger">Curso no encontrado o en desarrollo.</p>';
    } else {
      document.getElementById('course-badge').textContent = course.badge;
      document.getElementById('course-title').textContent = course.title;
      buildMenu();
      checkExamStatusAndLoad();
    }

    let chartInstance = null;
    let quizAnswers = {};

    function buildMenu() {
      const menu = document.getElementById('module-menu');
      course.modules.forEach((mod, idx) => {
        const div = document.createElement('div');
        div.className = 'sidebar-item';
        div.textContent = mod.name;
        div.onclick = () => loadModule(idx, div);
        menu.appendChild(div);
      });
    }

    async function checkExamStatusAndLoad() {
      try {
        const res = await fetch(`${API_BASE}/exam-result/${currentStudent.studentUser}/${courseId}`);
        const result = await res.json();
        if (result && result.passed) {
           course.examPassed = result;
        }
      } catch (e) { console.error(e); }
      
      // Load first module by default
      const firstItem = document.getElementById('module-menu').children[0];
      loadModule(0, firstItem);
    }

    function loadModule(idx, element) {
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
      if(element) element.classList.add('active');
      
      const mod = course.modules[idx];
      document.getElementById('module-title').textContent = mod.name;
      
      const contentArea = document.getElementById('content-area');
      contentArea.innerHTML = ''; // clear

      const wrapper = document.createElement('div');
      wrapper.className = 'module-content active';

      if (mod.type === 'text') {
        wrapper.innerHTML = `<div class="lesson-text">${mod.content}</div>`;
      } 
      else if (mod.type === 'quiz') {
        renderQuiz(wrapper, mod);
      }
      else if (mod.type === 'demo_lr') {
        renderDemoLR(wrapper);
      }
      else if (mod.type === 'csv_lr') {
        renderCSVTool(wrapper);
      }
      else if (mod.type === 'demo_ga') {
        window.renderGADemo(wrapper);
      }

      contentArea.appendChild(wrapper);
    }

    function renderQuiz(wrapper, mod) {
      if (course.examPassed) {
        wrapper.innerHTML = `
          <div class="cert-box">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">🏆</h1>
            <h2 style="color: var(--accent); margin-bottom: 0.5rem;">¡Examen Aprobado!</h2>
            <p style="color: var(--text); font-size: 1.1rem; margin-bottom: 1rem;">Puntuación: ${course.examPassed.score}%</p>
            <p style="color: var(--muted); font-size: 0.9rem;">Has completado exitosamente este curso el ${course.examPassed.date}.</p>
          </div>
        `;
        return;
      }

      let html = '<div id="quiz-container">';
      mod.questions.forEach((q, i) => {
        html += `
          <div class="quiz-question">
            <h3 style="margin-bottom: 1rem; font-size: 1.1rem; color: #fff;">${i+1}. ${q.q}</h3>
            ${q.options.map((opt, optIdx) => `
              <label class="quiz-option">
                <input type="radio" name="q${i}" value="${optIdx}">
                ${opt}
              </label>
            `).join('')}
          </div>
        `;
      });
      html += `
        <button class="cta" onclick="submitQuiz()" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">Enviar Examen</button>
        <p id="quiz-msg" class="msg" style="margin-top: 1rem; text-align: center;"></p>
      </div>`;
      wrapper.innerHTML = html;
      
      // Attach to window so onclick works
      window.submitQuiz = async () => {
        let score = 0;
        let allAnswered = true;
        mod.questions.forEach((q, i) => {
          const selected = document.querySelector(`input[name="q${i}"]:checked`);
          if (!selected) allAnswered = false;
          else if (parseInt(selected.value) === q.correct) score++;
        });

        if (!allAnswered) {
          document.getElementById('quiz-msg').textContent = '⚠️ Por favor responde todas las preguntas.';
          document.getElementById('quiz-msg').className = 'msg danger';
          return;
        }

        const percentage = Math.round((score / mod.questions.length) * 100);
        const passed = percentage >= 70;
        const msgEl = document.getElementById('quiz-msg');
        msgEl.textContent = '⏳ Enviando resultados...';
        msgEl.className = 'msg info';

        try {
          const res = await fetch(`${API_BASE}/exam-result`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              studentUser: currentStudent.studentUser,
              courseId: courseId,
              score: percentage,
              passed: passed
            })
          });

          if (res.ok) {
            if (passed) {
              course.examPassed = { score: percentage, passed: true, date: new Date().toLocaleDateString() };
              // Reload the exam module to show certificate
              const examIdx = course.modules.findIndex(m => m.id === 'examen');
              const examBtn = document.getElementById('module-menu').children[examIdx];
              loadModule(examIdx, examBtn);
            } else {
              msgEl.textContent = `❌ Reprobado con ${percentage}%. Necesitas al menos 70%. ¡Intenta de nuevo!`;
              msgEl.className = 'msg danger';
            }
          } else {
            const errData = await res.json();
            msgEl.textContent = `Error: ${errData.error || 'No se pudo guardar el resultado.'}`;
            msgEl.className = 'msg danger';
          }
        } catch (e) {
          console.error(e);
          msgEl.textContent = 'Error de red al enviar el examen. Revisa tu conexión.';
          msgEl.className = 'msg danger';
        }
      };
    }

    function renderDemoLR(wrapper) {
      wrapper.innerHTML = `
        <div class="tool-box">
          <h3 style="color: var(--accent); margin-bottom: 1rem;">Generador Interactivo de Puntos</h3>
          <p style="color: var(--muted); margin-bottom: 1.5rem; font-size: 0.9rem;">Añade puntos haciendo clic en el gráfico y el algoritmo dibujará la línea de regresión automáticamente en tiempo real.</p>
          <div style="background: #fff; padding: 1rem; border-radius: 8px;">
            <canvas id="lrDemoChart" height="100"></canvas>
          </div>
          <button class="btn-small btn-danger" onclick="clearLRDemo()" style="margin-top: 1.5rem;">Limpiar Puntos</button>
        </div>
      `;

      setTimeout(() => {
        const ctx = document.getElementById('lrDemoChart').getContext('2d');
        const dataPoints = [];
        
        chartInstance = new Chart(ctx, {
          type: 'scatter',
          data: {
            datasets: [
              { label: 'Datos', data: dataPoints, backgroundColor: '#6366f1', pointRadius: 6 },
              { label: 'Línea de Regresión', data: [], type: 'line', borderColor: '#ef4444', borderWidth: 2, fill: false, pointRadius: 0 }
            ]
          },
          options: {
            responsive: true,
            scales: { x: { min: 0, max: 100 }, y: { min: 0, max: 100 } },
            onClick: (e) => {
              const canvasPosition = Chart.helpers.getRelativePosition(e, chartInstance);
              const dataX = chartInstance.scales.x.getValueForPixel(canvasPosition.x);
              const dataY = chartInstance.scales.y.getValueForPixel(canvasPosition.y);
              
              if(dataX >= 0 && dataX <= 100 && dataY >= 0 && dataY <= 100) {
                dataPoints.push({x: dataX, y: dataY});
                updateRegressionLine(chartInstance, dataPoints);
              }
            }
          }
        });

        window.clearLRDemo = () => {
          dataPoints.length = 0;
          chartInstance.data.datasets[1].data = [];
          chartInstance.update();
        };
      }, 100);
    }

    function renderCSVTool(wrapper) {
      wrapper.innerHTML = `
        <div class="tool-box">
          <h3 style="color: var(--accent); margin-bottom: 1rem;">Herramienta: Subir CSV</h3>
          <p style="color: var(--muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
            Sube un archivo CSV con dos columnas numéricas separadas por comas (X,Y) sin encabezado.<br>
            El sistema calculará la regresión lineal localmente en tu navegador.
          </p>
          <input type="file" id="csvFileInput" accept=".csv" style="margin-bottom: 1rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
          <button class="cta" onclick="processCSV()" style="padding: 0.5rem 1.5rem;">Procesar Datos</button>
          <p id="csv-msg" class="msg" style="margin-top: 1rem;"></p>
          
          <div id="csv-chart-container" style="display:none; background: #fff; padding: 1rem; border-radius: 8px; margin-top: 2rem;">
            <canvas id="lrCSVChart" height="100"></canvas>
            <div id="csv-equation" style="color: #000; font-weight: bold; margin-top: 1rem;"></div>
          </div>
        </div>
      `;

      window.processCSV = () => {
        const fileInput = document.getElementById('csvFileInput');
        const msg = document.getElementById('csv-msg');
        if (!fileInput.files.length) {
          msg.textContent = 'Selecciona un archivo CSV primero.';
          msg.className = 'msg danger';
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target.result;
          const rows = text.split('\n');
          const points = [];
          
          rows.forEach(row => {
            const cols = row.split(',');
            if (cols.length >= 2) {
              const x = parseFloat(cols[0]);
              const y = parseFloat(cols[1]);
              if (!isNaN(x) && !isNaN(y)) {
                points.push({x, y});
              }
            }
          });

          if (points.length < 2) {
            msg.textContent = 'El CSV debe tener al menos 2 pares de números válidos (X,Y).';
            msg.className = 'msg danger';
            return;
          }

          msg.textContent = `✅ ${points.length} puntos procesados correctamente.`;
          msg.className = 'msg success';

          document.getElementById('csv-chart-container').style.display = 'block';
          
          if (chartInstance) chartInstance.destroy();

          const ctx = document.getElementById('lrCSVChart').getContext('2d');
          
          // Auto scale max/min
          const minX = Math.min(...points.map(p => p.x));
          const maxX = Math.max(...points.map(p => p.x));
          
          chartInstance = new Chart(ctx, {
            type: 'scatter',
            data: {
              datasets: [
                { label: 'Datos CSV', data: points, backgroundColor: '#3b82f6', pointRadius: 4 },
                { label: 'Línea Ajustada', data: [], type: 'line', borderColor: '#10b981', borderWidth: 2, fill: false, pointRadius: 0 }
              ]
            },
            options: { responsive: true }
          });

          const eq = updateRegressionLine(chartInstance, points, minX, maxX);
          document.getElementById('csv-equation').textContent = `Ecuación resultante: ${eq}`;
        };
        reader.readAsText(file);
      };
    }

    // Math function to calculate linear regression
    function updateRegressionLine(chart, points, customMinX, customMaxX) {
      if (points.length < 2) {
        chart.data.datasets[1].data = [];
        chart.update();
        return;
      }
      
      let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
      points.forEach(p => {
        sumX += p.x;
        sumY += p.y;
        sumXY += p.x * p.y;
        sumX2 += p.x * p.x;
      });
      
      const n = points.length;
      const m = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
      const b = (sumY - m * sumX) / n;
      
      const minX = customMinX !== undefined ? customMinX : 0;
      const maxX = customMaxX !== undefined ? customMaxX : 100;

      chart.data.datasets[1].data = [
        { x: minX, y: m * minX + b },
        { x: maxX, y: m * maxX + b }
      ];
      
      chart.update();
      return `Y = ${m.toFixed(4)}X + ${b.toFixed(4)}`;
    }
  </script>
</body>
</html>
