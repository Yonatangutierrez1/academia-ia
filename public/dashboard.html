<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA | Panel de Estudiante</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    if (!sessionStorage.getItem('currentStudent')) {
      window.location.href = 'login.html?type=student';
    }
  </script>
</head>
<body>
  <canvas id="neural"></canvas>

  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <div class="sidebar">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <span class="badge" style="font-size: 0.7rem; letter-spacing: 0.1em;">PORTAL ESTUDIANTES</span>
      </div>
      
      <div class="sidebar-item active" onclick="switchTab('courses', this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Mis Cursos
      </div>
      <div class="sidebar-item" onclick="switchTab('account', this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mi Cuenta
      </div>
      
      <div style="flex: 1;"></div>
      
      <div class="sidebar-item" onclick="logout()" style="color: #fca5a5;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-content">
      
      <!-- Courses Tab -->
      <div id="tab-courses" class="tab-content active" style="flex-direction: column;">
        <div class="card" style="align-items: stretch; padding: 2rem 3rem;">
          <h2 style="font-size: 2rem; margin-bottom: 0.5rem; color: #fff;" id="student-welcome-name">¡Hola!</h2>
          <p class="sub" style="margin-bottom: 2rem;">Revisa tu progreso y el estado de tus inscripciones.</p>
          
          <h3 style="font-size: 1.5rem; color: var(--accent2); margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem;">Mis Cursos Inscritos</h3>
          <div id="student-courses-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem;">
            <p style="color: var(--muted); font-size: 0.9rem;">Cargando cursos...</p>
          </div>
        </div>
      </div>

      <!-- Account Tab -->
      <div id="tab-account" class="tab-content" style="flex-direction: column;">
        <div class="card" style="align-items: center; padding: 2.5rem 3rem;">
          <div style="width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent); box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); margin-bottom: 1.5rem;">
            <img id="student-avatar" src="" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
          <h2 style="font-size: 1.8rem; margin-bottom: 0.2rem; text-align: center; color: #fff;">Mi Perfil</h2>
          <p class="sub" style="text-align: center; font-size: 0.85rem; margin-bottom: 2rem;">
            Actualiza tu información y contraseña.
          </p>

          <form id="student-profile-form" style="width: 100%; max-width: 400px; margin: 0;">
            <div class="form-group" style="margin-bottom: 1.2rem;">
              <label for="student-edit-name">Nombre Completo</label>
              <input type="text" id="student-edit-name" required style="padding: 0.7rem;">
            </div>
            <div class="form-group" style="margin-bottom: 1.2rem;">
              <label for="student-edit-pic">Foto de Perfil (Max 2MB. JPG, PNG, WEBP)</label>
              <input type="file" id="student-edit-pic" accept=".jpg,.jpeg,.png,.webp" style="padding: 0.7rem; background: rgba(15, 23, 42, 0.5); color: var(--text);">
            </div>
            <div class="form-group" style="margin-bottom: 1.2rem;">
              <label for="student-edit-current-pass">Contraseña Actual (Requerida para cambiar)</label>
              <input type="password" id="student-edit-current-pass" placeholder="Tu contraseña actual..." style="padding: 0.7rem;">
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label for="student-edit-new-pass">Nueva Contraseña</label>
              <input type="password" id="student-edit-new-pass" placeholder="********" style="padding: 0.7rem;">
            </div>
            <button type="submit" class="cta" style="width: 100%; font-size: 0.95rem; padding: 0.8rem;">Guardar Cambios</button>
            <p id="student-profile-msg" class="msg" style="margin-top: 1rem; font-size: 0.8rem; padding: 0.5rem;"></p>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    let currentStudent = JSON.parse(sessionStorage.getItem('currentStudent'));

    const studentProfileForm = document.getElementById('student-profile-form');
    const studentProfileMsg = document.getElementById('student-profile-msg');

    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      
      document.getElementById('tab-' + tabId).classList.add('active');
      el.classList.add('active');
    }

    async function renderStudentDashboard() {
      const firstName = currentStudent.name.split(' ')[0];
      document.getElementById('student-welcome-name').textContent = `¡Hola, ${firstName}!`;
      document.getElementById('student-edit-name').value = currentStudent.name;
      document.getElementById('student-edit-pic').value = '';
      document.getElementById('student-edit-current-pass').value = '';
      document.getElementById('student-edit-new-pass').value = '';

      // Update avatar
      const avatarImg = document.getElementById('student-avatar');
      if (currentStudent.profilePic) {
        avatarImg.src = currentStudent.profilePic;
      } else {
        const initials = currentStudent.name.split(' ').map(w => w[0]).join('').toUpperCase();
        avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=6366f1&color=fff&size=120&bold=true`;
      }
      avatarImg.onerror = () => {
        avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(firstName)}&background=6366f1&color=fff&size=120&bold=true`;
      };
      
      // Fetch and render student courses
      const listContainer = document.getElementById('student-courses-list');
      listContainer.innerHTML = '<p style="text-align: center; color: var(--muted); font-size: 0.9rem;">Cargando cursos...</p>';
      
      try {
        const res = await fetch(`${API_BASE}/students/${currentStudent.studentUser}/courses`);
        const courses = await res.json();
        
        listContainer.innerHTML = '';
        if (courses.length === 0) {
           listContainer.innerHTML = '<p style="text-align: center; color: var(--muted); font-size: 0.9rem;">No estás inscrito en ningún curso aún.</p>';
        } else {
             courses.forEach(c => {
             const statusColor = c.status === 'Aceptado' ? 'var(--success)' : (c.status === 'Rechazado' ? 'var(--danger)' : 'var(--warning)');
             const hasContent = ['regresion-lineal', 'algoritmo-genetico'].includes(c.courseId);
             listContainer.innerHTML += `
               <div style="background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                 <div style="display: flex; align-items: center; gap: 1rem;">
                   <span style="font-size: 2rem;">${c.courseIcon}</span>
                   <span style="font-weight: 600; font-size: 1.1rem;">${c.courseName}</span>
                 </div>
                 <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                   <span style="font-size: 0.75rem; background: ${statusColor}22; color: ${statusColor}; padding: 0.3rem 0.8rem; border-radius: 4px; border: 1px solid ${statusColor}55; font-weight: bold;">
                     ${c.status.toUpperCase()}
                   </span>
                   ${c.status === 'Aceptado' && hasContent ? `<a href="course.html?id=${c.courseId}" style="font-size: 0.8rem; background: rgba(99,102,241,0.2); color: var(--accent); padding: 0.35rem 0.9rem; border-radius: 4px; border: 1px solid rgba(99,102,241,0.4); text-decoration: none; font-weight: 600; transition: all 0.2s;">Ir al Curso →</a>` : ''}
                 </div>
               </div>
             `;
           });
        }
      } catch (e) {
        console.error('Error fetching student courses', e);
        listContainer.innerHTML = '<p style="text-align: center; color: var(--danger); font-size: 0.9rem;">Error al cargar los cursos.</p>';
      }
    }

    studentProfileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newName = document.getElementById('student-edit-name').value;
      const fileInput = document.getElementById('student-edit-pic');
      const currentPass = document.getElementById('student-edit-current-pass').value;
      const newPass = document.getElementById('student-edit-new-pass').value;

      const bodyData = { name: newName };
      
      if (newPass.trim() !== '') {
        if (currentPass.trim() === '') {
          alert('Debes ingresar tu contraseña actual para cambiarla.');
          return;
        }
        bodyData.currentPassword = currentPass.trim();
        bodyData.newPassword = newPass.trim();
      }

      const sendRequest = async () => {
        try {
          const res = await fetch(`${API_BASE}/students/${currentStudent.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyData)
          });

          if (res.ok) {
            const data = await res.json();
            
            if (data.passwordChangeSent) {
               alert('Se ha enviado un correo con un enlace para confirmar tu cambio de contraseña. Revisa tu bandeja de entrada.');
            }
            
            currentStudent.name = data.name;
            if (data.profilePic) currentStudent.profilePic = data.profilePic;
            
            sessionStorage.setItem('currentStudent', JSON.stringify(currentStudent));
            renderStudentDashboard();
            studentProfileMsg.textContent = '✓ Cambios guardados correctamente.';
            studentProfileMsg.classList.add('success');
            setTimeout(() => { studentProfileMsg.classList.remove('success'); }, 4000);
            
            document.getElementById('student-edit-current-pass').value = '';
            document.getElementById('student-edit-new-pass').value = '';
          } else {
             const err = await res.json();
             alert('Error: ' + err.error);
          }
        } catch (error) {
          console.error('Error actualizando perfil:', error);
          alert('Hubo un error de conexión.');
        }
      };

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        if (file.size > 2 * 1024 * 1024) {
          alert('El archivo supera los 2 MB permitidos.');
          return;
        }
        const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
        if (!validTypes.includes(file.type)) {
          alert('Solo se admiten imágenes JPG, PNG o WEBP.');
          return;
        }
        const reader = new FileReader();
        reader.onloadend = () => {
          bodyData.profilePic = reader.result;
          sendRequest();
        };
        reader.readAsDataURL(file);
      } else {
        sendRequest();
      }
    });

    renderStudentDashboard();
  </script>
</body>
</html>
